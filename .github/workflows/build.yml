name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
      
      - name: Decode Keystore and Create Key Properties
        run: |
          # 解码keystore文件
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks
          # 创建key.properties文件
          cat > android/key.properties << 'KEYEOF'
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release-key.jks
          KEYEOF
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release
      
      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk Apilot-${{ github.ref_name }}.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: Apilot-${{ github.ref_name }}.apk

  release:
    needs: build-android
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "Apilot-${{ github.ref_name }}.apk"
          name: "🚀 Apilot ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
