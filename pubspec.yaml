name: api_manager
description: A multi-platform API manager for AI model APIs
publish_to: 'none'
version: 1.14.0+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.0
  uuid: ^4.2.1
  http: ^1.1.0
  encrypt: ^5.0.1
  json_annotation: ^4.8.1
  intl: ^0.19.0
  qr_flutter: ^4.1.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.5.5
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  json_serializable: ^6.7.1
  build_runner: ^2.4.7
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
